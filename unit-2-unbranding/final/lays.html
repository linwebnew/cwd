<!doctype html>
<html>
<head>
    <title>Lays</title>

    <style>
        /* PAGE BACKGROUND IMAGE */
        body {
            background-image: url("assets/images/background.png"); /* change if needed */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: sans-serif;
            margin: 0;
        }

        /* MAIN CONTAINER */
        #everything {
            position: relative;
            width: 900px; /* controls size */
            margin: 120px auto;
        }

        /* STACKED IMAGES */
        .bag, .oil {
            width: 100%;
            display: block;
            position: absolute;
        
        }

        /* OIL hidden initially */
        .oil {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .bag {
            transition: opacity 0.5s ease;
        }

        
        .overlay-text { 
            position: absolute; 
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: black;
            opacity: 0;
            transition: opacity 0.4s ease;
            text-align: center;
        }

        /* HOVER EFFECT */
        #everything:hover .bag {
            opacity: 0;
        }

        #everything:hover .oil {
            opacity: 1;
        }

        #everything:hover .overlay-text {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div id="everything">
        <img src="assets/images/lays chips.png" class="bag">
        <img src="assets/images/oil.png" class="oil">
        <div class="overlay-text">Lays... more like lies!</div>
    </div>

</body>
</html>
